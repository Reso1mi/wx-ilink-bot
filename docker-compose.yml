services:
  xhs-downloader:
    image: "${BOT_XHS_IMAGE:-joeanamier/xhs-downloader}"
    container_name: xhs-downloader
    command: ["python", "main.py", "api"]
    restart: unless-stopped
    ports:
      - "${BOT_XHS_API_PORT:-5556}:5556"
    volumes:
      - xhs-downloader-volume:/app/Volume
      - ./xhs-settings.json:/app/Volume/settings.json:ro

  wx-ilink-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wx-ilink-bot
    restart: unless-stopped
    depends_on:
      - xhs-downloader
    environment:
      BOT_LOG_LEVEL: "${BOT_LOG_LEVEL:-info}"
      BOT_BASE_URL: "${BOT_BASE_URL:-https://ilinkai.weixin.qq.com}"
      BOT_APP_ID: "${BOT_APP_ID:-bot}"
      BOT_VERSION: "${BOT_VERSION:-1.0.0}"
      BOT_HTTP_PORT: "${BOT_HTTP_PORT:-3000}"
      BOT_STATE_DIR: /app/state
      BOT_XHS_API_URL: "${BOT_XHS_API_URL:-http://xhs-downloader:5556}"
      BOT_XHS_COOKIE: "${BOT_XHS_COOKIE:-}"
      BOT_XHS_PROXY: "${BOT_XHS_PROXY:-}"
      BOT_XHS_TIMEOUT_MS: "${BOT_XHS_TIMEOUT_MS:-60000}"
    ports:
      - "${BOT_HTTP_PORT:-3000}:${BOT_HTTP_PORT:-3000}"
    volumes:
      - ./state:/app/state

volumes:
  xhs-downloader-volume:
