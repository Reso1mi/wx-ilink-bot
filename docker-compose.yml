services:
  wx-ilink-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wx-ilink-bot
    restart: unless-stopped
    environment:
      BOT_LOG_LEVEL: "${BOT_LOG_LEVEL:-info}"
      BOT_BASE_URL: "${BOT_BASE_URL:-https://ilinkai.weixin.qq.com}"
      BOT_APP_ID: "${BOT_APP_ID:-bot}"
      BOT_VERSION: "${BOT_VERSION:-1.0.0}"
      BOT_HTTP_PORT: "${BOT_HTTP_PORT:-3000}"
      BOT_STATE_DIR: /app/state
    ports:
      - "${BOT_HTTP_PORT:-3000}:${BOT_HTTP_PORT:-3000}"
    volumes:
      - ./state:/app/state
